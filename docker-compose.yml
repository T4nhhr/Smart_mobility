version: '3.9'

services:
  # ─── LocalStack (simulates AWS) ───────────────────────────────────────────────
  localstack:
    image: localstack/localstack:3.4
    container_name: urbanmove-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,kinesis,s3,cognito-idp,lambda
      - DEFAULT_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_HOST=localstack
      - DEBUG=0
    volumes:
      - ./infra/localstack:/etc/localstack/init/ready.d:ro
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: development
    container_name: urbanmove-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ENDPOINT_URL=http://localstack:4566
      - DYNAMODB_VEHICLES_TABLE=Vehicles
      - DYNAMODB_TELEMETRY_TABLE=Telemetry
      - DYNAMODB_ROUTES_TABLE=Routes
      - DYNAMODB_ALERTS_TABLE=Alerts
      - KINESIS_STREAM_NAME=telemetry-stream
      - JWT_SECRET=urbanmove-dev-secret-2024
      - CORS_ORIGIN=http://localhost:5173,http://localhost:80,https://cuter-lue-untrying.ngrok-free.dev,https://4znrrmbr-3000.asse.devtunnels.ms
    volumes:
      - ./backend/src:/app/src:ro
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Frontend (Vite Dev) ──────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: urbanmove-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=https://4znrrmbr-3000.asse.devtunnels.ms
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  # ─── Telemetry Simulator ──────────────────────────────────────────────────────
  simulator:
    image: node:20-alpine
    container_name: urbanmove-simulator
    working_dir: /app
    command: node simulator.js
    volumes:
      - ./infra/localstack:/app:ro
    environment:
      - API_URL=http://backend:3000
      - INTERVAL_MS=2000
      - VEHICLE_COUNT=20
    depends_on:
      backend:
        condition: service_healthy

volumes:
  localstack_data:
  frontend_modules:
